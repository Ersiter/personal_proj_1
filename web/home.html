<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>戴启东住宅方案</title>
</head>
<body>
<script>
(function(){
  var base='dai-qidong-scheme-v';
  // Generate candidate URLs: v4..v20 × last 14 days
  var d=new Date(), dates=[], urls=[];
  for(var i=0;i<14;i++){
    var y=String(d.getFullYear()).slice(-2);
    var m=String(d.getMonth()+1).padStart(2,'0');
    var dd=String(d.getDate()).padStart(2,'0');
    dates.push(y+m+dd);
    d.setDate(d.getDate()-1);
  }
  for(var v=4;v<=20;v++){
    for(var j=0;j<dates.length;j++){
      urls.push({n:v,date:dates[j],url:base+v+'_'+dates[j]+'.html'});
    }
  }
  var best=null;
  var done=0;
  urls.forEach(function(c){
    fetch(c.url,{method:'HEAD'}).then(function(r){
      if(r.ok&&(!best||c.n>best.n||(c.n===best.n&&c.date>best.date))){
        best=c;
      }
    }).catch(function(){}).finally(function(){
      done++;
      if(done>=urls.length&&best){
        location.replace(best.url);
      }
    });
  });
  // Fallback after 3s
  setTimeout(function(){
    if(!best) location.replace('dai-qidong-scheme-v4_260519.html');
  },3000);
})();
</script>
</body>
</html>
