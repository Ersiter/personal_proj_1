  <style>
    :root {
      --bg: #faf8f4;
      --surface: #fffdf9;
      --ink: #2c1810;
      --ink-soft: #5c4a3e;
      --amber: #c4934a;
      --rule: #e8e3d8;
      --qr-size: min(72vmin, 348px);
      --qr-popover-bg: var(--surface, #fffdf9);
      --qr-popover-fg: var(--ink, #2c1810);
      --qr-popover-accent: var(--amber, #c4934a);
      --qr-popover-rule: var(--rule, #e8e3d8);
      --qr-code-bg: #fffdf9;
      --qr-code-fg: #2c1810;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: clamp(24px, 6vw, 64px);
      background: linear-gradient(145deg, var(--bg), #f3efe6);
      color: var(--qr-popover-fg);
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .qr-hover {
      width: min(100%, calc(var(--qr-size) + 96px));
      padding: clamp(22px, 5vw, 46px);
      border: 1px solid var(--qr-popover-rule);
      border-radius: 18px;
      background: var(--qr-popover-bg);
      box-shadow: 0 18px 55px rgba(44, 24, 16, 0.08);
      text-align: center;
    }

    .qr-hover h1 {
      margin: 0 0 0.35rem;
      font: 700 clamp(1.15rem, 3vw, 1.65rem)/1.35 "Noto Serif SC", "STSong", "SimSun", serif;
      letter-spacing: 0.08em;
    }

    .qr-hover p {
      margin: 0 0 clamp(18px, 4vw, 28px);
      color: var(--ink-soft, #5c4a3e);
      font-size: clamp(0.82rem, 1.8vw, 0.95rem);
      line-height: 1.7;
      text-wrap: pretty;
    }

    .qr-frame {
      width: var(--qr-size);
      max-width: 100%;
      margin-inline: auto;
      padding: clamp(10px, 2.4vw, 16px);
      border: 1px solid color-mix(in srgb, var(--qr-popover-accent) 24%, var(--qr-popover-rule));
      border-radius: 14px;
      background: var(--qr-code-bg);
    }

    .qr-svg { display: block; width: 100%; height: auto; color: var(--qr-code-fg); }
    .qr-svg-bg { fill: var(--qr-code-bg); }
    .qr-svg-path { fill: none; stroke: currentColor; stroke-width: 0.96; stroke-linecap: round; stroke-linejoin: round; }
    .qr-target { margin-top: 1rem; color: var(--qr-popover-accent); font-size: 0.78rem; overflow-wrap: anywhere; }
  </style>
