name: Deploy to Retinbox

on:
  push:
    branches: [main]
    paths:
      - 'web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: |
          f=$(mktemp)
          trap 'rm -f $f' EXIT
          curl -fSL https://host.retiehe.com/cli -o $f
          node $f --site ersiter-chen --outdir web
